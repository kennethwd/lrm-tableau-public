name: LRM scoring

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

jobs:
  run-lrm:
    runs-on: ubuntu-latest

    steps:

      # Checkout your repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # Checkout the Linguistic Risk Measurement repo
      - name: Checkout LRM engine
        uses: actions/checkout@v4
        with:
          repository: 888jjm-dotcom/Linguistic-Risk-Measurement
          path: lrm_repo

      # Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Install dependencies
      - name: Install dependencies
        run: |
          pip install pandas scikit-learn pdfplumber

      # Copy LRM files into working directory
      - name: Copy LRM engine files
        run: |
          cp lrm_repo/LRM_engine.py .
          cp lrm_repo/scoring_rules.json .

      # Debug files (helps if things break)
      - name: Debug repo files
        run: |
          echo "Repository files:"
          ls -la
          echo "profiles.jsonl preview:"
          head -n 5 profiles.jsonl

      # Run the scoring script
      - name: Run LRM scoring
        run: |
          python run_lrm_csv.py

      # Commit results.csv back to repo
      - name: Commit results
        run: |
          git config user.name github-actions
          git config user.email actions@github.com
          git add results.csv
          git commit -m "Update LRM results" || echo "No changes to commit"
          git push
