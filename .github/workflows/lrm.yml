name: Debug files
  run: |
    ls -la
    echo "---- profiles.jsonl ----"
    sed -n '1,5p' profiles.jsonl || true


name: LRM scoring

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - uses: actions/checkout@v4
      with:
        repository: 888jjm-dotcom/Linguistic-Risk-Measurement
        path: lrm_repo

    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - run: |
        pip install pandas scikit-learn pdfplumber

    - run: |
        cp lrm_repo/LRM_engine.py .
        cp lrm_repo/scoring_rules.json .
        python run_lrm_csv.py

    - name: Commit results
      run: |
        git config user.name github-actions
        git config user.email actions@github.com
        git add results.csv
        git commit -m "update LRM results" || echo "no changes"
        git push
